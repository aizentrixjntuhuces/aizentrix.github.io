<html lang="en">
<head>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { cursor: none !important; }

        body {
            background-color: #050505;
            color: #00f3ff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 0, 150, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        #cursor-dot {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            box-shadow: 0 0 15px #ff00ff, 0 0 30px #00f3ff;
            transform: translate(-50%, -50%);
        }

        .glitch {
            position: relative;
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); transform: skew(0.5deg); }
            5% { clip: rect(30px, 9999px, 40px, 0); transform: translateX(-2px); color: #ff00ff; }
            10% { clip: rect(60px, 9999px, 70px, 0); transform: skew(-0.5deg); color: #00f3ff; }
            15% { clip: rect(0, 0, 0, 0); opacity: 1; }
            20% { clip: rect(80px, 9999px, 90px, 0); opacity: 0.8; }
            100% { clip: rect(0, 0, 0, 0); }
        }

        .nav-blur {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #ff00ff;
        }

        .dropdown-menu {
            background: rgba(0, 0, 0, 0.98);
            border: 1px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            min-width: 200px;
        }

        .dropdown-item {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
            width: 100%;
            text-align: left;
        }

        .dropdown-item:hover {
            background: rgba(255, 0, 150, 0.1);
            color: #ff00ff;
            padding-left: 25px;
        }

        .nav-link {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            padding: 30px 0;
            background: rgba(255, 0, 150, 0.02);
            border-top: 1px solid rgba(255, 0, 150, 0.1);
            border-bottom: 1px solid rgba(255, 0, 150, 0.1);
        }

        .marquee-track {
            display: flex;
            width: max-content;
            animation: scrollMarquee 80s linear infinite;
        }

        @keyframes scrollMarquee {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }
        .coord-card {
            min-width: 300px;
            padding: 25px;
            margin: 0 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff00ff;
            text-align: center;
        }

        .coord-role {
            color: #ff00ff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        /* --- ADDED HOVER AND MOBILE READY --- */
        .event-card {
            background: rgba(0, 243, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer !important;
        }
        .event-card:hover {
            border-color: #ff00ff;
            background: rgba(255, 0, 150, 0.05);
            box-shadow: 0 0 25px rgba(255, 0, 150, 0.3);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            #cursor-dot { display: none; }
            * { cursor: auto !important; }
        }

        .event-loc {
            font-size: 14px;
            border: 2px solid #00f3ff;
            padding: 4px 10px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .main-logo {
            width: 150px;
            filter: drop-shadow(0 0 20px #ff00ff);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(5, 5, 5, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(30px);
            padding: 20px;
            overflow-y: auto;   /* allows page scroll */
        }

        .modal-container {
            max-width: 900px;
            width: 100%;
            max-height: 85vh;      /* prevents overflow on mobile */
            overflow-y: auto;      /* enables internal scroll */
            padding: 40px;
            text-align: center;
            background: #000;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.2);
        }

        /* MOBILE FIX */
        @media (max-width:768px){

            .modal-container{
                padding:25px;
            }

            .modal-container h1{
                font-size:32px !important;
                line-height:1.2;
            }

            .modal-container ul{
                font-size:16px;
            }

            .modal-overlay{
                padding:15px;
            }

        }
        .modal-container::-webkit-scrollbar {
            width: 6px;
        }

        .modal-container::-webkit-scrollbar-track {
            background: black;
        }

        .modal-container::-webkit-scrollbar-thumb {
            background: #ff00ff;
            border-radius: 10px;
        }
    </style>
</head>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playHover() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();

            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
