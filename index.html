<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIZENTRIX | CSE AI & ML</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        * { cursor: none !important; }

        body {
            background-color: #050505;
            color: #00f3ff;
            font-family: 'Rajdhani', sans-serif;
            overflow-x: hidden;
            margin: 0;
            background-image: 
                linear-gradient(to right, rgba(255, 0, 150, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        body::after {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 255, 0, 0.03));
            z-index: 9999;
            background-size: 100% 4px, 3px 100%;
            pointer-events: none;
        }

        .orbitron { font-family: 'Orbitron', sans-serif; }

        #cursor-dot {
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 10001;
            box-shadow: 0 0 15px #ff00ff, 0 0 30px #00f3ff;
            transform: translate(-50%, -50%);
        }

        .glitch {
            position: relative;
            animation: glitch-anim 2.5s infinite linear alternate-reverse;
        }
        @keyframes glitch-anim {
            0% { clip: rect(10px, 9999px, 20px, 0); transform: skew(0.5deg); }
            5% { clip: rect(30px, 9999px, 40px, 0); transform: translateX(-2px); color: #ff00ff; }
            10% { clip: rect(60px, 9999px, 70px, 0); transform: skew(-0.5deg); color: #00f3ff; }
            15% { clip: rect(0, 0, 0, 0); opacity: 1; }
            20% { clip: rect(80px, 9999px, 90px, 0); opacity: 0.8; }
            100% { clip: rect(0, 0, 0, 0); }
        }

        .nav-blur {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid #ff00ff;
        }

        .dropdown-menu {
            background: rgba(0, 0, 0, 0.98);
            border: 1px solid #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.2);
            min-width: 200px;
        }

        .dropdown-item {
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            transition: 0.3s;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: block;
            width: 100%;
            text-align: left;
        }

        .dropdown-item:hover {
            background: rgba(255, 0, 150, 0.1);
            color: #ff00ff;
            padding-left: 25px;
        }

        .nav-link {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff;
        }

        .marquee-wrapper {
            width: 100%;
            overflow: hidden;
            padding: 30px 0;
            background: rgba(255, 0, 150, 0.02);
            border-top: 1px solid rgba(255, 0, 150, 0.1);
            border-bottom: 1px solid rgba(255, 0, 150, 0.1);
        }
        .marquee-track {
            display: flex;
            animation: marquee 20s linear infinite;
            width: max-content;
        }
        @keyframes marquee {
            0% { transform: translateX(0); }
            100% { transform: translateX(-30%); }
        }
        .coord-card {
            min-width: 300px;
            padding: 25px;
            margin: 0 20px;
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff00ff;
            text-align: center;
        }

        .coord-role {
            color: #ff00ff;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 3px;
            margin-top: 8px;
        }

        /* --- ADDED HOVER AND MOBILE READY --- */
        .event-card {
            background: rgba(0, 243, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer !important;
        }
        .event-card:hover {
            border-color: #ff00ff;
            background: rgba(255, 0, 150, 0.05);
            box-shadow: 0 0 25px rgba(255, 0, 150, 0.3);
            transform: translateY(-5px);
        }

        @media (max-width: 768px) {
            #cursor-dot { display: none; }
            * { cursor: auto !important; }
        }

        .event-loc {
            font-size: 14px;
            border: 2px solid #00f3ff;
            padding: 4px 10px;
            color: #00f3ff;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .main-logo {
            width: 150px;
            filter: drop-shadow(0 0 20px #ff00ff);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 10000;
            background: rgba(5, 5, 5, 0.98);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(30px);
            overflow-y: auto;
            padding: 40px;
        }

        .modal-container {
            max-width: 1100px;
            width: 95%;
            padding: 50px;
            text-align: center;
            background: #000;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.2);
        }
    </style>
</head>
<body x-data="festSystem()">
    <div id="cursor-dot"></div>

    <nav class="fixed top-0 w-full z-[5000] nav-blur">
        <div class="max-w-7xl mx-auto px-6 h-24 flex items-center justify-between">
            <div class="orbitron text-2xl md:text-4xl font-black tracking-tighter glitch text-white" data-text="AIZENTRIX">AIZENTRIX</div>
            
            <div class="hidden md:flex space-x-12 items-center font-bold uppercase tracking-widest text-white">
                <div class="relative group" x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false">
                    <button class="nav-link hover:text-cyan-400">TECH</button>
                    <div x-show="open" x-transition class="dropdown-menu absolute left-0 mt-2">
                        <button @click="openModal('hackathon')" class="dropdown-item orbitron">NEURAL_HACK</button>
                        <button @click="openModal('coderace')" class="dropdown-item orbitron">CODE_RACE</button>
                        <button @click="openModal('quiz')" class="dropdown-item orbitron">TECH_QUIZ</button>
                        <button @click="openModal('debug')" class="dropdown-item orbitron">DEBUG_DOOM</button>
                    </div>
                </div>

                <div class="relative group" x-data="{ open: false }" @mouseenter="open = true" @mouseleave="open = false">
                    <button class="nav-link hover:text-pink-500">NON-TECH</button>
                    <div x-show="open" x-transition class="dropdown-menu absolute left-0 mt-2">
                        <button @click="openModal('bgmi')" class="dropdown-item orbitron">BGMI_ARENA</button>
                        <button @click="openModal('flashmob')" class="dropdown-item orbitron">FLASH_MOB</button>
                        <button @click="openModal('dance')" class="dropdown-item orbitron">DANCE_CONTEST</button>
                        <button @click="openModal('fun')" class="dropdown-item orbitron">FUN_ZONE</button>
                    </div>
                </div>

                <button onclick="document.getElementById('schedule').scrollIntoView({behavior: 'smooth'})" class="bg-gradient-to-r from-cyan-500 to-purple-600 px-6 py-2 text-white font-black orbitron text-sm">SCHEDULE</button>
            </div>
        </div>
    </nav>

    <section class="min-h-screen flex flex-col justify-center items-center text-center pt-32 pb-10 px-4">
        <img src="/Aizentrix%20Logo.png" alt="Aizentrix Logo" class="main-logo mb-8">
        
        <h1 class="orbitron text-5xl md:text-7xl font-black glitch mb-4 text-white" data-text="AIZENTRIX">AIZENTRIX</h1>
        
        <p class="orbitron text-xs md:text-lg text-white tracking-[0.6em] mb-12 opacity-80 uppercase">
            <span class="text-cyan-400"> INNOVATE // </span> AUTOMATE <span class="text-pink-500">// DOMINATE </span> // 2026
        </p>

        <div class="marquee-wrapper mb-12">
            <div class="marquee-track">
                <template x-for="i in 2">
                    <div class="flex">
                        <template x-for="person in coordinators">
                            <div class="coord-card">
                                <p class="orbitron text-white font-bold text-xl" x-text="person.name"></p>
                                <p class="coord-role orbitron" x-text="person.role"></p>
                            </div>
                        </template>
                    </div>
                </template>
            </div>
        </div>
        
        <button onclick="playClick(); document.getElementById('schedule').scrollIntoView({behavior: 'smooth'})" 
                class="bg-white text-black px-12 py-4 orbitron font-black text-xl hover:bg-pink-500 hover:text-white transition-all shadow-[0_0_40px_rgba(255,0,255,0.4)]">
            VIEW_SYSTEM_SCHEDULE
        </button>
    </section>

    <section id="schedule" class="max-w-6xl mx-auto py-32 px-6">
        <h2 class="orbitron text-4xl font-black text-white mb-16 flex items-center gap-6 uppercase tracking-widest">
            <span class="w-12 h-1 bg-gradient-to-r from-pink-500 to-cyan-500"></span> 
            EVENT_LOG
        </h2>
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <template x-for="event in scheduleData">
                <div class="event-card p-10 flex flex-col justify-between" @click="if(event.id) openModal(event.id)" onmouseenter="playHover()">
                    <div class="flex justify-between items-start mb-6">
                        <span class="orbitron text-pink-500 text-2xl font-black" x-text="event.time"></span>
                        <span class="event-loc" x-text="event.loc"></span>
                    </div>
                    <h3 class="orbitron text-3xl font-black mb-3 text-white tracking-tighter uppercase" x-text="event.title"></h3>
                    <p class="text-gray-400 font-medium text-lg" x-text="event.desc"></p>
                </div>
            </template>
        </div>
    </section>

    <template x-if="activeModal">
        <div class="modal-overlay" x-transition.opacity>
            <div class="modal-container">
                <button @click="activeModal = null" class="fixed top-8 right-8 orbitron text-pink-500 text-xl border-2 border-pink-500 px-4 py-1 hover:bg-pink-500 hover:text-white transition-all">
                    [ SHUT_DOWN ]
                </button>
                <h1 class="orbitron text-5xl md:text-8xl font-black glitch text-white mb-8 uppercase" :data-text="eventDetails[activeModal].title" x-text="eventDetails[activeModal].title"></h1>
                <div class="border-y border-cyan-500/30 py-10 mb-10 text-left bg-black/60 px-10">
                    <h4 class="orbitron text-pink-500 mb-6 text-2xl font-black uppercase">>> SYSTEM_RULES:</h4>
                    <ul class="space-y-4 text-base md:text-xl text-gray-200">
                        <template x-for="rule in eventDetails[activeModal].rules">
                            <li class="flex items-start gap-4">
                                <span class="text-cyan-500 mt-1">▶</span>
                                <span x-text="rule"></span>
                            </li>
                        </template>
                    </ul>
                </div>
                <button onclick="playClick()" class="bg-cyan-500 text-black px-16 py-5 orbitron font-black text-2xl hover:bg-pink-500 hover:text-white transition-all shadow-[0_0_30px_rgba(0,243,255,0.4)]">
                    REGISTER_ENTRY
                </button>
            </div>
        </div>
    </template>

    <footer class="py-16 text-center border-t border-cyan-900/30 bg-black/50">
    <div class="mb-8">
        <a href="https://www.instagram.com/aizentrix_2026?igsh=YjhwMGh0MmU4c2M5" target="_blank" 
          onmouseenter="playHover()" 
           onclick="playClick()"
           class="inline-block p-3 text-pink-500 transition-all duration-300 hover:scale-110 active:scale-95">
            <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" 
                 stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" 
                 class="drop-shadow-[0_0_8px_rgba(255,0,255,0.8)] hover:drop-shadow-[0_0_20px_rgba(255,0,255,1)]">
                <rect width="20" height="20" x="2" y="2" rx="5" ry="5"></rect>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"></path>
                <line x1="17.5" x2="17.51" y1="6.5" y2="6.5"></line>
            </svg>
        </a>
    </div>

    <p class="orbitron text-[10px] tracking-[0.4em] text-gray-500 uppercase">
        © 2026 AIZENTRIX // <span class="text-pink-500 font-bold">CREATED BY TECH_TEAM_AIZENTRIX</span>

    </p>
    <p class="orbitron text-[10px] tracking-[0.4em] text-gray-500 uppercase">
    CONTACT US AT : 
        <span class="text-pink-500 font-bold">+91 9441745945</span> //
        <span class="text-pink-500 font-bold">+91 7989617499</span>
    </p>

</footer>

<script>
  lucide.createIcons();
</script>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playHover() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.01, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
        function playClick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        const dot = document.getElementById('cursor-dot');
        document.addEventListener('mousemove', e => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
        });

        function festSystem() {
            return {
                activeModal: null,
                coordinators: [
                    {name: 'SATHVIK', role: 'MAIN_COORDINATOR'},
                    {name: 'BALVAN', role: 'MAIN_COORDINATOR'},
                    {name: 'YASHASWI', role: 'MAIN_COORDINATOR'},
                    {name: 'SANKEERTHANA', role: 'MAIN_COORDINATOR'},
                    {name: 'MIKRAAM', role: 'TECH_COORDINATOR'},
                    {name: 'NEERAJ', role: 'TECH_COORDINATOR'},
                    {name: 'MANISHA', role: 'TECH_COORDINATOR'},
                    {name: 'PRANATHI', role: 'TECH_COORDINATOR'},
                    {name: 'AKSHITHA', role: 'CULTURAL_COORDINATOR'},
                    {name: 'RAJESHWARI', role: 'CULTURAL_COORDINATOR'},
                    {name: 'RAM CHARAN', role: 'CULTURAL_COORDINATOR'},
                    {name: 'HARSHA', role: 'CULTURAL_COORDINATOR'},
                    {name: 'THIRUPATHI', role: 'SPORTS_COORDINATOR'},
                    {name: 'SHIVA', role: 'SPORTS_COORDINATOR'},
                    {name: 'SHARANYA', role: 'SPORTS_COORDINATOR'},
                    {name: 'BHAVANI', role: 'SPORTS_COORDINATOR'}
                ],
                scheduleData: [
                    {time: '11:00 AM', title: 'NEURAL_HACK', desc: 'AI/ML Hackathon', loc: 'CYBER BLOCK', id: 'hackathon'},
                    {time: '12:30 PM', title: 'BLIND_CODING', desc: 'Coding without seeing screen', loc: 'ZONE X', id: 'CODE1'},
                    {time: '02:00 PM', title: 'CODE_GOLF', desc: 'Shortest Solution', loc: 'CYBER BLOCK', id: 'CODE2'},
                    {time: '03:30 PM', title: 'CODE_RELAY', desc: 'Relay Coding Challenge', loc: 'CAMPUS', id: 'CODE3'},
                    {time: '02:00 PM', title: 'T_PICTIONARY', desc: 'Guess the Tech Term', loc: 'CYBER BLOCK', id: 'CODE4'},

                    {time: '02:00 PM', title: 'MOVIE_QUIZ', desc: 'Quiz on Movies', loc: 'CYBER BLOCK', id: 'quiz'},
                    {time: '02:00 PM', title: 'MURDER_HOUSE', desc: 'Murder Mystery Game', loc: 'CAMPUS', id: 'MYSTERY'},
                    {time: '02:00 PM', title: 'POSTER_MAKING', desc: 'Create a poster on a given theme', loc: 'CAMPUS', id: 'fun'},
                    {time: '02:00 PM', title: 'SCAVENGE_HUNT', desc: 'Find hidden items around campus', loc: 'CAMPUS', id: 'scavenger'}
                ],
                eventDetails: {
                    hackathon: { title: 'NEURAL_HACK', rules: ['Team size: 4.', '24 Hours.', 'AI theme.'] },
                    CODE1:{ title: 'BLIND_CODING', rules: ['Team size:2.', 'HackerRank.', 'Best Solution Wins'] },
                    CODE2: { title: 'CODE_GOLF', rules: ['Individual.', 'HackerRank.', 'Shortest Solution Wins'] },
                    CODE3: { title: 'CODE_RELAY', rules: ['Team of 3.', 'Person 1 writes function logic', 'Person 2 debugs','Person 3 optimizes','Switch every 3 minutes.'] },
                    CODE4: { title: 'T_PICTIONARY', rules: ['Python/C++/Any Tech word.', 'Guess the Tech Term.', 'Time based.'] },
                    quiz: { title: 'MOVIE_QUIZ', rules: ['Individual.', '3 Rounds.', 'No gadgets.'] },
                    MYSTERY: { title: 'MURDER_HOUSE', rules: ['Team of 4.', 'Solve the mystery.', 'Clues provided.'] },
                    fun: { title: 'POSTER_MAKING', rules: ['Individual.', 'Theme-based.', 'Judged by panel.','On-Spot making'] },
                    scavenger: { title: 'SCAVENGE_HUNT', rules: ['Individual/Team.', 'Campus wide.', 'Find hidden items.'] }
                },
                openModal(type) { if(type) { playClick(); this.activeModal = type; } }
            }
        }
    </script>
</body>
</html>
